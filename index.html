<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>L'Amour Interior Designs</title>

<style>
body {
  background: #0b0b0b;
  color: white;
  font-family: Arial;
  text-align: center;
  padding: 50px;
}

textarea {
  width: 80%;
  height: 120px;
  padding: 10px;
  margin-top: 20px;
  background: #111;
  color: white;
  border: 1px solid #444;
}

button {
  margin-top: 20px;
  padding: 12px 25px;
  background: green;
  color: white;
  border: none;
  cursor: pointer;
}

img {
  margin-top: 30px;
  max-width: 90%;
  border-radius: 10px;
}

#loading {
  display: none;
  margin-top: 20px;
}

</style>
</head>

<body>

<h1>L'Amour Interior Designs</h1>

<textarea id="prompt" placeholder="Describe your design..."></textarea>
<br>
<button onclick="generate()">Generate Design</button>

<div id="loading">Generating image...</div>

<img id="image" />
<p id="desc"></p>

<script>
async function generate() {
  const prompt = document.getElementById("prompt").value;

  if (!prompt) {
    alert("Enter prompt");
    return;
  }

  document.getElementById("loading").style.display = "block";
  document.getElementById("image").src = "";
  document.getElementById("desc").innerText = "";

  try {
    const res = await fetch("/api/generate", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ prompt })
    });

    const data = await res.json();

    document.getElementById("loading").style.display = "none";

    document.getElementById("image").src = data.image;
    document.getElementById("desc").innerText = data.description;

  } catch (err) {
    document.getElementById("loading").innerText = "Error generating image";
  }
}
</script>

</body>
</html>
